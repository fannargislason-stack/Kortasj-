<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kortasjá – Hafnabótasjóður</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a2332;height:100vh;display:flex;flex-direction:column;}

  header{background:#1e3a5f;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:2px solid #2a5a8f;}
  header h1{font-size:1.1rem;font-weight:700;color:#fff;white-space:nowrap;}
  .subtitle{font-size:0.7rem;color:#aac8e8;}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-left:auto;}
  .seg{display:flex;background:rgba(0,0,0,0.25);border-radius:20px;padding:2px;gap:2px;}
  .seg button{padding:4px 12px;border:none;background:transparent;color:#aac8e8;border-radius:16px;cursor:pointer;font-size:0.73rem;transition:all 0.15s;white-space:nowrap;}
  .seg button.active{background:#fff;color:#1e3a5f;font-weight:600;}
  .seg button:hover:not(.active){color:#fff;}
  .divider{width:1px;height:24px;background:rgba(255,255,255,0.2);}
  .defl-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .defl-toggle input{display:none;}
  .slider{width:32px;height:17px;background:rgba(255,255,255,0.2);border-radius:9px;position:relative;transition:background 0.2s;flex-shrink:0;}
  .slider::after{content:'';position:absolute;width:13px;height:13px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left 0.2s;}
  input:checked+.slider{background:#4ade80;}
  input:checked+.slider::after{left:17px;}
  .defl-toggle span{font-size:0.72rem;color:#cce0ff;white-space:nowrap;}

  .year-row{display:none;gap:5px;align-items:center;padding:5px 18px 6px;background:#162d4a;border-bottom:1px solid #2a5a8f;overflow-x:auto;}
  .year-row.show{display:flex;}
  .year-label{font-size:0.7rem;color:#7aabcc;white-space:nowrap;}
  .yr-btn{padding:3px 11px;border:1.5px solid rgba(255,165,0,0.4);background:transparent;color:#ffd080;border-radius:12px;cursor:pointer;font-size:0.73rem;transition:all 0.15s;white-space:nowrap;}
  .yr-btn.active{background:#f97316;border-color:#f97316;color:#fff;font-weight:600;}
  .yr-btn:hover:not(.active){background:rgba(249,115,22,0.2);}

  #map{flex:1;}

  .leaflet-popup-content-wrapper{background:#fff;border:none;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,0.18);padding:0;}
  .leaflet-popup-tip{background:#fff;}
  .leaflet-popup-content{margin:0;padding:0;color:#1a2332;width:370px !important;max-height:540px;overflow-y:auto;}

  .popup-header{background:#1e3a5f;padding:14px 16px;border-radius:11px 11px 0 0;position:sticky;top:0;z-index:1;}
  .popup-header h3{font-size:1rem;color:#fff;margin-bottom:4px;}
  .popup-main-amt{font-size:1.4rem;font-weight:700;color:#7dd3fc;}
  .popup-main-amt .unit{font-size:0.67rem;color:#93c5e8;font-weight:400;margin-left:4px;}
  .popup-sub-amt{font-size:0.78rem;color:#93c5e8;margin-top:3px;}
  .popup-note{font-size:0.63rem;color:#7ab5d8;margin-top:2px;}

  .popup-body{padding:12px 16px;}
  .plan-row{display:flex;justify-content:space-between;padding:6px 10px;border-radius:6px;margin:3px 0;font-size:0.8rem;}
  .plan-row.p2013{background:#f0fdf4;border-left:3px solid #16a34a;}
  .plan-row.p2015{background:#fefce8;border-left:3px solid #ca8a04;}
  .plan-row.p2020{background:#eff6ff;border-left:3px solid #3b82f6;}
  .plan-row.p2026{background:#fff7ed;border-left:3px solid #f97316;}
  .plan-label{color:#475569;}
  .plan-amount{color:#1e3a5f;font-weight:700;}
  .plan-sub{color:#94a3b8;font-size:0.72rem;}

  .proj-header{font-size:0.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin:8px 0 5px;padding-top:8px;border-top:1px solid #e2e8f0;}
  .proj-item{padding:7px 10px;margin:4px 0;border-radius:7px;background:#f8fafc;border:1px solid #e2e8f0;}
  .proj-item.carried{background:#fefce8;border-color:#fde68a;}
  .proj-name{color:#1e3a5f;font-size:0.77rem;font-weight:500;margin-bottom:4px;line-height:1.3;}
  .proj-meta{display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .proj-tag{font-size:0.62rem;padding:2px 6px;border-radius:8px;white-space:nowrap;font-weight:600;}
  .t2013{background:#dcfce7;color:#15803d;}.t2015{background:#fef9c3;color:#92400e;}
  .t2020{background:#dbeafe;color:#1d4ed8;}.t2026{background:#ffedd5;color:#c2410c;}
  .proj-amt{color:#1e3a5f;font-weight:700;font-size:0.8rem;white-space:nowrap;}
  .lokid-note{font-size:0.62rem;color:#92400e;background:#fef9c3;padding:2px 6px;border-radius:5px;margin-top:4px;}
  .year-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
  .year-pill{font-size:0.61rem;padding:1px 5px;border-radius:7px;background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;}

  .status-badge{font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;color:#fff;}
  .st-lokid{background:#16a34a;}
  .st-verklok{background:#65a30d;}
  .st-framkv{background:#2563eb;}
  .st-honnun{background:#d97706;}
  .st-ekki{background:#94a3b8;}
  .st-na{background:#cbd5e1;color:#475569;}
  .proj-status{margin-top:4px;}
.status-subs{display:flex;flex-direction:column;gap:2px;margin-top:5px;}
  .status-sub-row{display:flex;justify-content:space-between;align-items:center;font-size:0.68rem;color:#64748b;gap:6px;}
  .status-note{font-size:0.65rem;color:#92400e;background:#fef9c3;padding:2px 6px;border-radius:5px;margin-top:4px;}

  .more-btn{width:100%;padding:6px;background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;cursor:pointer;font-size:0.73rem;border-radius:6px;margin-top:4px;text-align:center;}
  .more-btn:hover{background:#e2e8f0;}

  .legend{background:white;border:1px solid #cbd5e1;border-radius:10px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.1);min-width:165px;}
  .legend h4{font-size:0.77rem;color:#1e3a5f;margin-bottom:7px;font-weight:700;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:0.71rem;margin:5px 0;color:#475569;}
  .leg-circle{border-radius:50%;border:2px solid rgba(0,0,0,0.12);flex-shrink:0;}
  .legend-note{font-size:0.63rem;color:#94a3b8;margin-top:7px;padding-top:7px;border-top:1px solid #e2e8f0;line-height:1.5;}
  .hafna-tooltip{background:#1e3a5f !important;border:none !important;color:#fff !important;border-radius:6px !important;font-size:0.75rem !important;padding:5px 9px !important;box-shadow:0 2px 8px rgba(0,0,0,0.2) !important;}

  .year-panel{display:none;background:#fff;border:1px solid #cbd5e1;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.15);width:300px;max-height:70vh;overflow-y:auto;font-size:0.78rem;}
  .year-panel.show{display:block;}
  .year-panel h4{background:#1e3a5f;color:#fff;padding:8px 12px;border-radius:9px 9px 0 0;font-size:0.8rem;display:flex;justify-content:space-between;align-items:center;gap:8px;position:sticky;top:0;}
  .year-panel .yp-total{font-weight:400;font-size:0.68rem;color:#aac8e8;white-space:nowrap;}
  .year-panel .yp-list{padding:6px;}
  .year-panel .yp-item{padding:6px 8px;border-radius:6px;cursor:pointer;border-bottom:1px solid #f1f5f9;}
  .year-panel .yp-item:hover{background:#f1f5f9;}
  .year-panel .yp-muni{font-weight:600;color:#1e3a5f;font-size:0.73rem;}
  .year-panel .yp-name{color:#475569;font-size:0.72rem;margin:2px 0;line-height:1.3;}
  .year-panel .yp-amt{color:#2563eb;font-weight:700;font-size:0.75rem;}
  .year-panel .yp-empty{padding:10px;color:#94a3b8;}
</style>
</head>

const DEFL={'SGÁ 2013–2016':700/395,'SGÁ 2015–2018':700/421,'SGÁ 2020–2024':700/490,'SGÁ 2026–2030':1};
const PLAN_YEARS={'SGÁ 2013–2016':[2014,2015,2016],'SGÁ 2015–2018':[2015,2016,2017,2018],'SGÁ 2020–2024':[2020,2021,2022,2023,2024],'SGÁ 2026–2030':[2026,2027,2028,2029,2030]};
const PCSS={'SGÁ 2013–2016':'p2013','SGÁ 2015–2018':'p2015','SGÁ 2020–2024':'p2020','SGÁ 2026–2030':'p2026'};
const TCSS={'SGÁ 2013–2016':'t2013','SGÁ 2015–2018':'t2015','SGÁ 2020–2024':'t2020','SGÁ 2026–2030':'t2026'};

const STATUS_CSS={'Lokið':'st-lokid','Verklok og frágangur':'st-verklok','Framkvæmdir':'st-framkv','Hönnun og útboð':'st-honnun','Ekki hafið':'st-ekki'};
const STATUS_SCORE={'Lokið':100,'Verklok og frágangur':90,'Framkvæmdir':50,'Hönnun og útboð':15,'Ekki hafið':0};
const STATUS_ORDER=['Lokið','Verklok og frágangur','Framkvæmdir','Hönnun og útboð','Ekki hafið'];
const STATUS_COLOR_HEX={'Lokið':'#16a34a','Verklok og frágangur':'#65a30d','Framkvæmdir':'#2563eb','Hönnun og útboð':'#d97706','Ekki hafið':'#94a3b8'};

function statusBadge(label){
  const css=STATUS_CSS[label]||'st-na';
  return `<span class="status-badge ${css}">${label}</span>`;
}
function projStatusScore(p){
  const s=p.status2026; if(!s)return null;
  if(s.overall!==undefined)return STATUS_SCORE[s.overall];
  if(s.subs)return s.subs.reduce((sum,[,st])=>sum+STATUS_SCORE[st],0)/s.subs.length;
  return null;
}
function projStatusHtml(p){
  const s=p.status2026; if(!s)return '';
  let h='';
  if(s.overall!==undefined)h+=statusBadge(s.overall);
  if(s.subs)h+=`<div class="status-subs">${s.subs.map(([n,st])=>`<div class="status-sub-row"><span>${n}</span>${statusBadge(st)}</div>`).join('')}</div>`;
  if(s.note)h+=`<div class="status-note">${s.note}</div>`;
  return h;
}
function getMuniStatusScore(name){
  const d=D[name];let wsum=0,gsum=0;
  (d.projects||[]).forEach(p=>{
    if(p.plan!=='SGÁ 2026–2030')return;
    const sc=projStatusScore(p);
    if(sc===null)return;
    const g=p.grant||0.001;
    wsum+=sc*g;gsum+=g;
  });
  return gsum>0?wsum/gsum:null;
}
function statusColor(score){
  if(score===null)return'#cbd5e1';
  if(score>=95)return'#16a34a';
  if(score>=70)return'#65a30d';
  if(score>=35)return'#2563eb';
  if(score>5)return'#d97706';
  return'#94a3b8';
}

let mode='grant',filter='all',yr='all',statusMode=false,markers=[],markersByName={};

const map=L.map('map',{center:[65,-19],zoom:6});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

function isDefl(){return document.getElementById('deflToggle').checked;}
function adj(v,plan){return isDefl()?v*(DEFL[plan]||1):v;}

function getMuniAmt(name){
  const d=D[name]; let tot=0;
  if(filter==='all'){
    const src=mode==='grant'?d.by_plan_grant:d.by_plan_cost;
    Object.entries(src).forEach(([plan,v])=>{tot+=adj(v,plan);});
  } else if(yr==='all'){
    const v=(mode==='grant'?d.by_plan_grant:d.by_plan_cost)[filter]||0;
    tot=adj(v,filter);
  } else {
    d.projects.forEach(p=>{
      if(p.plan!==filter)return;
      const g=p.years[String(yr)]||0;
      if(g>0)tot+=adj(g,p.plan);
    });
  }
  return tot;
}

function getRadius(v,max){
  if(max<=0)return 5;
  return Math.min(20,Math.max(5,5+Math.sqrt(v/max)*15));
}
function getColor(v,max){
  if(max<=0)return'#6366f1';
  const r=v/max;
  if(r>0.85)return'#dc2626';if(r>0.5)return'#ea580c';if(r>0.25)return'#d97706';
  if(r>0.10)return'#16a34a';if(r>0.03)return'#2563eb';return'#6366f1';
}

function buildPopup(name){
  const d=D[name],mainAmt=getMuniAmt(name);
  const isG=mode==='grant',isYr=yr!=='all';

  let subLine='';
  if(!isYr){
    if(isG){
      const ct=Object.entries(d.by_plan_cost).reduce((s,[pl,v])=>{
        if(filter!=='all'&&pl!==filter)return s; return s+adj(v,pl);
      },0);
      subLine=`<div class="popup-sub-amt">Heildarkostnaður: ${Math.round(ct).toLocaleString('is-IS')} m.kr. m.vsk</div>`;
    } else {
      const gt=Object.entries(d.by_plan_grant).reduce((s,[pl,v])=>{
        if(filter!=='all'&&pl!==filter)return s; return s+adj(v,pl);
      },0);
      subLine=`<div class="popup-sub-amt">Ríkisframlag: ${Math.round(gt).toLocaleString('is-IS')} m.kr. á.vsk</div>`;
    }
  }

  const deflNote=isDefl()?'<div class="popup-note">Núvirt í verðlag 2026 (ÍSL NVV Hagstofa)</div>':'';
  const costNote=!isYr&&!isG?'<div class="popup-note" style="margin-bottom:6px">Heildark. 2026–2030: heildar framkvæmdakostnaður · Lokið-upphæðir eru dregnar frá eldri áætlunum til að koma í veg fyrir tvítalningu</div>':'';
  const hasRealloc=d.projects.some(p=>p.grant_realloc_deduct);
  const grantNote=!isYr&&isG&&hasRealloc?'<div class="popup-note" style="margin-bottom:6px">Óráðstafaðar fjárheimildir frá SGÁ 2020–2024 sem fluttar eru til síðari ára í SGÁ 2026–2030 eru dregnar frá ríkisframlagi 2020–2024 til að koma í veg fyrir tvítalningu</div>':'';

  let planRows='';
  Object.keys(d.by_plan_grant).forEach(plan=>{
    if(filter!=='all'&&plan!==filter)return;
    const gv=adj(d.by_plan_grant[plan]||0,plan);
    const cv=adj(d.by_plan_cost[plan]||0,plan);
    const mainV=isG?gv:cv, subV=isG?cv:gv;
    const subLbl=isG?'heildark.':'ríkisframl.';
    planRows+=`<div class="plan-row ${PCSS[plan]}">
      <span class="plan-label">${plan}</span>
      <span class="plan-amount">${Math.round(mainV).toLocaleString('is-IS')} m.kr.
        <span class="plan-sub">(${subLbl}: ${Math.round(subV).toLocaleString('is-IS')})</span>
      </span></div>`;
  });

  const projs=d.projects.filter(p=>{
    if(filter!=='all'&&p.plan!==filter)return false;
    if(isYr)return(p.years[String(yr)]||0)>0;
    return true;
  });

  const rProj=p=>{
    const rawAmt=isYr?(p.years[String(yr)]||0):(isG?p.grant:p.cost);
    const dispAmt=adj(rawAmt,p.plan);
    const hasLokid=p.lokid>0;
    const lokidNote=hasLokid&&!isYr&&!isG?
      `<div class="lokid-note">⚠ Lokið úr fyrri áætlun: ${Math.round(adj(p.lokid,p.plan)).toLocaleString('is-IS')} m.kr. · Heildar-kostn. (upprunalegt): ${Math.round(adj(p.heildar,p.plan)).toLocaleString('is-IS')} m.kr.</div>`:
      (hasLokid&&!isYr&&isG?`<div class="lokid-note">⚠ Lokið úr fyrri áætlun: ${Math.round(adj(p.lokid,p.plan)).toLocaleString('is-IS')} m.kr.</div>`:'');
    const reallocNote=p.grant_realloc_deduct&&!isYr&&isG?
      `<div class="lokid-note">↺ Óráðstöfuð fjárheimild frá SGÁ 2020–2024 (${Math.round(adj(p.grant_realloc_deduct,p.plan)).toLocaleString('is-IS')} m.kr.) flutt og dregin frá ríkisframlagi 2020–2024</div>`:'';
    const pills=!isYr?Object.entries(p.years).map(([y,v])=>`<span class="year-pill">${y}: ${Math.round(adj(v,p.plan))} m.</span>`).join(''):'';
    const statusHtml=(statusMode&&p.status2026)?`<div class="proj-status">${projStatusHtml(p)}</div>`:'';
    return `<div class="proj-item${hasLokid?' carried':''}">
      <div class="proj-name">${p.name}</div>
      <div class="proj-meta"><span class="proj-tag ${TCSS[p.plan]}">${p.plan}</span>
        <span class="proj-amt">${Math.round(dispAmt)} m.kr.</span></div>
      ${statusHtml}${lokidNote}${reallocNote}${pills?`<div class="year-pills">${pills}</div>`:''}
    </div>`;
  };

  const N=5,key=name.replace(/[^a-z0-9]/gi,'_');
  let ph=projs.slice(0,N).map(rProj).join(''),mh='';
  if(projs.length>N){
    const rest=projs.slice(N).map(rProj).join('');
    mh=`<div id="r_${key}" style="display:none">${rest}</div>
    <button class="more-btn" onclick="var e=document.getElementById('r_${key}');e.style.display=e.style.display?'':'none';this.textContent=e.style.display?'▼ Sýna ${projs.length-N} til viðbótar':'▲ Fela'">▼ Sýna ${projs.length-N} til viðbótar</button>`;
  }

  const ul=isG?'ríkisframlag, á.vsk':'heildarkostnaður, m.vsk';
  const yl=isYr?` · ${yr}`:'';
  return `<div>
    <div class="popup-header">
      <h3>${name}</h3>
      <div class="popup-main-amt">${Math.round(mainAmt).toLocaleString('is-IS')} m.kr.<span class="unit">${ul}${yl}</span></div>
      ${subLine}${deflNote}
    </div>
    <div class="popup-body">
      <div style="margin-bottom:8px">${planRows}</div>
      ${costNote}${grantNote}
      <div class="proj-header">Verkefni (${projs.length})</div>
      ${ph}${mh}
    </div></div>`;
}

function drawMarkers(){
  markers.forEach(m=>m.remove());markers=[];markersByName={};
  const amounts=[];
  Object.keys(D).forEach(name=>{
    const amt=getMuniAmt(name);
    if(amt>0)amounts.push([name,amt]);
  });
  const max=amounts.reduce((m,[,a])=>Math.max(m,a),0);
  amounts.forEach(([name,amt])=>{
    let fillColor,tooltip;
    if(statusMode){
      const score=getMuniStatusScore(name);
      fillColor=statusColor(score);
      tooltip=`<strong>${name}</strong><br>${score===null?'Engin staða skráð':'Framkvæmdastaða: '+Math.round(score)+'%'}`;
    } else {
      fillColor=getColor(amt,max);
      const ml=mode==='grant'?'ríkisframlag':'heildark.';
      tooltip=`<strong>${name}</strong><br>${Math.round(amt).toLocaleString('is-IS')} m.kr.${isDefl()?'†':''} (${ml})`;
    }
    const c=L.circleMarker([D[name].lat,D[name].lon],{
      radius:getRadius(amt,max),fillColor,color:'#fff',weight:1.5,fillOpacity:0.85
    }).addTo(map);
    c.bindPopup(()=>buildPopup(name),{maxWidth:400});
    c.bindTooltip(tooltip,{className:'hafna-tooltip',sticky:true});
    markers.push(c);
    markersByName[name]=c;
  });
  updateLegend(max);
  buildYearList();
}

function toggleStatusMode(){
  statusMode=document.getElementById('statusToggle').checked;
  if(statusMode){
    filter='SGÁ 2026–2030';yr='all';
    const planBtns=document.querySelectorAll('#planSeg button');
    planBtns.forEach(b=>b.classList.remove('active'));
    planBtns[4].classList.add('active');
    document.getElementById('yearRow').className='year-row';
  }
  drawMarkers();
}

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('legTitle').textContent=m==='grant'?'Ríkisframlag (m.kr.)':'Heildarkostnaður (m.kr.)';
  drawMarkers();
}

function setFilter(f,btn){
  filter=f;yr='all';
  document.querySelectorAll('#planSeg button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const row=document.getElementById('yearRow');
  if(f!=='all'&&PLAN_YEARS[f]){
    row.className='year-row show';
    row.innerHTML='<span class="year-label">Ár:</span>';
    const ab=document.createElement('button');ab.className='yr-btn active';ab.textContent='Öll ár';
    ab.onclick=function(){setYear('all',this);};row.appendChild(ab);
    PLAN_YEARS[f].forEach(y=>{
      const b=document.createElement('button');b.className='yr-btn';b.textContent=y;
      b.onclick=function(){setYear(y,this);};row.appendChild(b);
    });
  } else {row.className='year-row';}
  drawMarkers();
}

function setYear(y,btn){
  yr=y;
  document.querySelectorAll('.yr-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');drawMarkers();
}

let legendDiv;

legend.onAdd=function(){
  legendDiv=L.DomUtil.create('div','legend');

legend.addTo(map);

function updateLegend(max){
  if(!legendDiv)return;
  if(statusMode){
    legendDiv.innerHTML=`<h4>Framkvæmdastaða 2026–2030</h4>
      ${STATUS_ORDER.map(s=>`<div class="legend-item"><div class="leg-circle" style="width:16px;height:16px;background:${STATUS_COLOR_HEX[s]}"></div>${s}</div>`).join('')}
      <div class="legend-item"><div class="leg-circle" style="width:16px;height:16px;background:#cbd5e1"></div>Engin staða skráð</div>
      <div class="legend-note">Litur sveitarfélags: vegið meðaltal stöðu verkefna á SGÁ 2026–2030 (vegið eftir ríkisframlagi)</div>`;
    return;
  }
  const fmt=v=>Math.round(v).toLocaleString('is-IS');
  const title=mode==='grant'?'Ríkisframlag (m.kr.)':'Heildarkostnaður (m.kr.)';
  if(max<=0){
    legendDiv.innerHTML=`<h4 id="legTitle">${title}</h4><div class="legend-note">† = upphæð núvirt í verðlag 2026 (ÍSL NVV Hagstofa)</div>`;
    return;
  }
  const t1=max*0.85,t2=max*0.5,t3=max*0.25,t4=max*0.10,t5=max*0.03;
  legendDiv.innerHTML=`<h4 id="legTitle">${title}</h4>
    <div class="legend-item"><div class="leg-circle" style="width:22px;height:22px;background:#dc2626"></div>yfir ${fmt(t1)}</div>
    <div class="legend-item"><div class="leg-circle" style="width:18px;height:18px;background:#ea580c"></div>${fmt(t2)}–${fmt(t1)}</div>
    <div class="legend-item"><div class="leg-circle" style="width:15px;height:15px;background:#d97706"></div>${fmt(t3)}–${fmt(t2)}</div>
    <div class="legend-item"><div class="leg-circle" style="width:12px;height:12px;background:#16a34a"></div>${fmt(t4)}–${fmt(t3)}</div>
    <div class="legend-item"><div class="leg-circle" style="width:9px;height:9px;background:#2563eb"></div>${fmt(t5)}–${fmt(t4)}</div>
    <div class="legend-item"><div class="leg-circle" style="width:6px;height:6px;background:#6366f1"></div>undir ${fmt(t5)}</div>
    <div class="legend-note">† = upphæð núvirt í verðlag 2026 (ÍSL NVV Hagstofa)</div>`;
}

let yearPanelDiv;
const yearPanelCtrl=L.control({position:'topright'});
yearPanelCtrl.onAdd=function(){
  yearPanelDiv=L.DomUtil.create('div','year-panel');
  L.DomEvent.disableClickPropagation(yearPanelDiv);
  L.DomEvent.disableScrollPropagation(yearPanelDiv);
  return yearPanelDiv;
};
yearPanelCtrl.addTo(map);

function focusMuni(name){
  const d=D[name];if(!d)return;
  map.setView([d.lat,d.lon],Math.max(map.getZoom(),9));
  if(markersByName[name])markersByName[name].openPopup();
}

function buildYearList(){
  if(!yearPanelDiv)return;
  if(yr==='all'){yearPanelDiv.classList.remove('show');yearPanelDiv.innerHTML='';return;}
  const items=[];
  Object.entries(D).forEach(([name,d])=>{
    (d.projects||[]).forEach(p=>{
      if(filter!=='all'&&p.plan!==filter)return;
      const v=p.years[String(yr)]||0;
      if(v>0)items.push({muni:name,proj:p,amt:adj(v,p.plan)});
    });
  });
  items.sort((a,b)=>b.amt-a.amt);
  const total=items.reduce((s,it)=>s+it.amt,0);
  const dl=isDefl()?'†':'';
  const rows=items.map(it=>`<div class="yp-item" onclick="focusMuni('${it.muni.replace(/'/g,"\\'")}')">
    <div class="yp-muni">${it.muni}</div>
    <div class="yp-name">${it.proj.name}</div>
    <div class="yp-amt">${Math.round(it.amt).toLocaleString('is-IS')} m.kr.${dl}</div>
  </div>`).join('');
  yearPanelDiv.innerHTML=`<h4>Verkefni ${yr}<span class="yp-total">${items.length} stk · ${Math.round(total).toLocaleString('is-IS')} m.kr.${dl}</span></h4>
    <div class="yp-list">${rows||'<div class="yp-empty">Engin verkefni þetta ár</div>'}</div>`;
  yearPanelDiv.classList.add('show');
}

drawMarkers();
</script>
</body>
</html>
